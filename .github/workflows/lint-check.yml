---
name: "Spotless Lint Check"
"on":
  pull_request:
    branches:
    - "develop"
    - "main"
concurrency:
  group: "checks-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  spotless:
    runs-on: "ubuntu-latest"
    permissions:
      checks: "write"
      contents: "read"
      pull-requests: "write"
    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v4"
    - name: "Set up JDK"
      uses: "actions/setup-java@v4"
      with:
        distribution: "temurin"
        java-version: 17
    - name: "Cache Gradle"
      uses: "actions/cache@v4"
      with:
        path: "~/.gradle/caches\n~/.gradle/wrapper\n"
        key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties')\
          \ }}"
        restore-keys: "${{ runner.os }}-gradle-"


    - name: "Run Spotless check"
      id: "spotless-check"
      run: "./gradlew spotlessCheck"
      continue-on-error: true
    - name: "Comment on PR if format fails"
      if: "failure() && steps.spotless-check.outcome == 'failure'"
      uses: "marocchino/sticky-pull-request-comment@v2.9.4"
      with:
        header: "format-check"
        message: "❌ Spotless formatting check failed in one or more modules.\n\nRun\
          \ the following command locally to auto-fix:\n```bash\n./gradlew spotlessApply\n\
          ```\n\nThen commit & push the changes to update this PR ✅\n"
    - name: "Fail job if Spotless check failed"
      if: "steps.spotless-check.outcome == 'failure'"
      run: "exit 1"
