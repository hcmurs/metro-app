---
name: "Spotless Lint Check"
"on":
  pull_request:
    branches:
    - "develop"
    - "main"
concurrency:
  group: "checks-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  spotless:
    runs-on: "ubuntu-latest"
    permissions:
      checks: "write"
      contents: "read"
      pull-requests: "write"
    steps:
    - name: "Checkout code"
      uses: "actions/checkout@v4"
    - name: "Set up JDK"
      uses: "actions/setup-java@v4"
      with:
        distribution: "temurin"
        java-version: 17
    - name: "Cache Gradle"
      uses: "actions/cache@v4"
      with:
        path: "~/.gradle/caches\n~/.gradle/wrapper\n"
        key: "${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties')\
          \ }}"
        restore-keys: "${{ runner.os }}-gradle-"
    - name: "Run Spotless check"
      run: "./gradlew spotlessCheck || echo 'FAILED=true' >> $GITHUB_ENV"
    - name: "Comment on PR if format fails"
      if: "env.FAILED == 'true'"
      uses: "marocchino/sticky-pull-request-comment@v2.9.4"
      with:
        header: "format-check"
        message: "❌ Spotless formatting check failed.\n\nRun this command to fix:\n\
          ```bash\n./gradlew spotlessApply\n```\n"
    - name: "Fail if needed"
      if: "env.FAILED == 'true'"
      run: "exit 1"
